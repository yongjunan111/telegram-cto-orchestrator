handoff:
  id: orch-session-cleanup-policy-v1
  room_id: orchestrator-hardening-gc-v1
  program_id: null
  from: orchestrator
  to: orch-worker-b-adr
  status: completed
  priority: high
  kind: implementation
task:
  description: 'V1 policy + bootstrap + read-only cleanup report for worker session
    lifecycle. Three deliverables: (1) Bootstrap team lead protocol gets two reinforcement
    blocks: (a) when handoff has execution.mode=delegate_required, prepend a HARD
    ''DO NOT IMPLEMENT DIRECTLY'' block; (b) after handoff complete is filed, append
    POST-COMPLETE CLEANUP instructions telling the worker to file a session checkpoint
    and leave a clear pane marker, but explicitly forbid the worker from running tmux
    kill on itself. (2) NEW lib/session_cleanup.py module with a read-only report
    function: scans .orchestrator/runtime/sessions/*.yaml + handoff state, produces
    a candidate list (session_id, peer_id, status, room_id, handoff_id, idle_minutes,
    related_handoff_status, related_review_state, recommendation_token); recommendation
    tokens locked to: needs_worker_complete, needs_cto_review, needs_session_checkpoint,
    awaiting_review_evidence, leftover_after_complete, parse_error. NEVER kills tmux,
    never mutates YAML. (3) Docs: update docs/issue-team-lead-delegation-not-enforced.md
    checkboxes that the bootstrap delegation strong wording lands here; create docs/session-cleanup-policy.md
    (V1 operating rule + safe dry-run flow + explicit invariants: no auto-kill, CTO-review-pending
    sessions never recommended for cleanup).'
  scope: 'Allowed files ONLY: lib/bootstrap.py, lib/session_cleanup.py (NEW), docs/issue-team-lead-delegation-not-enforced.md,
    docs/session-cleanup-policy.md (NEW), docs/sub-handoff-format.md (append-only
    — see constraints), tests/test_bootstrap_delegation_rendering.py (NEW), tests/test_session_cleanup_report.py
    (NEW). Do NOT touch lib/handoffs.py, orchctl, lib/idle_snapshot.py, lib/gc_audit.py,
    lib/dispatch.py, lib/sessions.py, lib/checkpoints.py, lib/validators.py, .orchestrator/
    data, pyproject.toml. Other sessions are active in this repo — do NOT revert unrelated
    dirty/untracked files.'
  constraints:
  - 'LOCKED CONTRACT (mirrors handoff orch-delegation-gate-schema): handoff state
    has top-level ''execution'' block with execution.mode in {direct, delegate_optional,
    delegate_required}, and execution.child_handoffs list. Bootstrap rendering reads
    execution.mode via dict.get(''execution'', {}).get(''mode''); legacy handoffs
    (no execution block) treated as delegate_optional and rendered with current behavior
    unchanged.'
  - 'Bootstrap delegate_required block (rendered ONLY when execution.mode == ''delegate_required''):
    prepend before the existing team lead protocol with literal heading ''DELEGATION
    REQUIRED — DO NOT IMPLEMENT DIRECTLY'' and these enforced bullet points: (1) decompose
    into disjoint child handoffs, (2) use Agent tool with smallest viable model (haiku/sonnet)
    per child, (3) record each child via ''orchctl handoff add-subtask <this-id> ...'',
    (4) verify child evidence then run ''orchctl handoff complete'', (5) if no safe
    decomposition exists, escalate to CTO instead of implementing directly. State:
    ''Direct file edits will NOT pass the completion gate.'' For execution.mode in
    (direct, delegate_optional, absent), do NOT render this block — preserve current
    behavior.'
  - 'Bootstrap post-complete cleanup block (always rendered for ALL handoffs in the
    team lead protocol section, NOT mode-gated): heading ''POST-COMPLETE CLEANUP''.
    Bullets: (a) after running ''orchctl handoff complete'', run ''orchctl session
    checkpoint <session-id> --event manual --note "work concluded"'', (b) print a
    clear pane marker line (e.g. ''WORK_DONE: <handoff-id>'') so an operator can visually
    confirm completion in tmux, (c) DO NOT kill your own tmux session — the operator/CTO
    owns kill decisions, (d) if CTO review/rework is expected, leave the pane idle
    and respond to ledger updates rather than ending the session.'
  - 'lib/session_cleanup.py exposes function ''build_cleanup_report(rooms_filter:
    Optional[List[str]] = None, idle_minutes: int = 60) -> Dict'' returning {generated_at,
    threshold_minutes, candidates: [...], invariants_acknowledged: [...]}. Each candidate
    has the locked field set above and exactly one recommendation_token from the locked
    enum. Module includes a ''render_markdown(report: Dict) -> str'' for human output.
    NO file writes from this module — pure compute (caller may write report file if
    desired).'
  - 'Recommendation token routing rules (lock these in code as constants and document
    in docs/session-cleanup-policy.md): related handoff status=open + session status=busy
    + idle ≥ threshold → needs_worker_complete; related handoff status=completed +
    review state=pending → needs_cto_review; related handoff status=completed + review
    state=approved + session status=busy → leftover_after_complete (signals candidate
    for operator-led tmux kill, NEVER auto); session has no checkpoint and is busy
    ≥ threshold → needs_session_checkpoint; review state=changes_requested → awaiting_review_evidence;
    YAML unparseable / handoff_id unsafe → parse_error. NEVER emit a token like ''auto_kill'',
    ''safe_to_kill'', ''archive_ready'', ''can_archive'' (forbidden words test enforced).'
  - 'docs/session-cleanup-policy.md (NEW) explicit invariants section: (i) V1 is read-only
    / report-only; no automatic tmux kill, no automatic YAML mutation, no automatic
    checkpoint generation; (ii) CTO review-pending or rework-pending sessions are
    NEVER recommended for kill; (iii) Operator-led kill is the only sanctioned path
    in V1; (iv) The report is informational, not authoritative state. Include ''How
    to read the report'' subsection mapping each token to operator action.'
  - docs/sub-handoff-format.md edits limited to APPENDING a single short section titled
    'Delegate-Required Hard Mode (V1)' that points readers to the new policy and to
    handoff orch-delegation-gate-schema's contract. Do NOT rewrite existing sections.
  - 'docs/issue-team-lead-delegation-not-enforced.md: only check off the boxes that
    this handoff actually delivers (bootstrap strong wording for delegate_required)
    and add a ''V1 Implementation Note'' subsection at the bottom listing landed handoff
    ids (orch-delegation-gate-schema for the gate, orch-session-cleanup-policy-v1
    for bootstrap+report). Do NOT edit unrelated parts of that doc.'
  acceptance_criteria:
  - Bootstrap rendering for execution.mode=delegate_required produces output containing
    the literal string 'DELEGATION REQUIRED — DO NOT IMPLEMENT DIRECTLY' and 'Direct
    file edits will NOT pass the completion gate.' Test asserts presence.
  - Bootstrap rendering for execution.mode in (direct, delegate_optional, absent)
    does NOT contain that string (regression test). Diff against pre-change snapshot
    for one representative legacy handoff is empty.
  - Bootstrap rendering for ALL handoffs (regardless of mode) contains 'POST-COMPLETE
    CLEANUP' heading and the four bullets specified. Test asserts presence on at least
    three modes (delegate_required, delegate_optional, legacy).
  - lib/session_cleanup.build_cleanup_report returns dict with 'candidates' list;
    each candidate's recommendation_token is in the locked enum; on a fixture with
    one open+busy session yields needs_worker_complete; on completed+pending yields
    needs_cto_review; on completed+approved+busy yields leftover_after_complete; on
    changes_requested yields awaiting_review_evidence; on unparseable YAML yields
    parse_error.
  - render_markdown output passes a forbidden-words grep (auto_kill|safe_to_kill|archive_ready|can_archive|green_light|ready_for_archive|auto_archive_eligible)
    — must match nothing.
  - docs/session-cleanup-policy.md exists, contains the four invariants enumerated
    above, and documents the locked recommendation token set.
  - docs/issue-team-lead-delegation-not-enforced.md gains a 'V1 Implementation Note'
    subsection with both handoff IDs (orch-delegation-gate-schema, orch-session-cleanup-policy-v1)
    and ticks only the relevant follow-up checkboxes.
  - 'Full suite green: ''uv run pytest tests/ -q'' (count must increase by ≥6 new
    tests across the two new test files; existing count must not decrease).'
  report_back: 'Post in CTO Telegram thread when complete: (a) test count delta (before/after),
    (b) confirm bootstrap legacy/non-required modes are byte-identical to pre-change
    (cite the regression test name), (c) summary of recommendation token routing rules
    with one fixture example each, (d) any deviations from locked contract with rationale.'
  non_goals:
  - Adding orchctl CLI subcommand for cleanup (deferred to V1.5; handoff A is editing
    orchctl now and we avoid file conflict).
  - Implementing actual tmux kill / archive / compact in any form.
  - Modifying lib/handoffs.py (handoff A owns it for the gate).
  - Schema changes to handoff YAML (handoff A locks the contract).
  - Auto-launching the report on a cron / hook (V2+ work).
  - Reviewing or completing the orch-room-idle-snapshot-v1 handoff.
  - Cleaning up the 8 stale open handoffs in the room.
  - Statusline / Node IPv6 / paper-radar fixes.
  - Modifying or wiring the orchctl session checkpoint command (it already exists).
  invariants:
  - 'Read-only: lib/session_cleanup.py never writes, never spawns subprocesses, never
    calls tmux. Pre/post invocation YAML+state byte hashes identical (test enforced).'
  - Bootstrap rendering for legacy handoffs (no execution block) and execution.mode
    in (direct, delegate_optional) is byte-identical to current output (regression
    test enforced).
  - No new orchctl subcommand wiring in V1 (handoff A owns orchctl edits; this handoff
    stays out of orchctl to avoid edit conflict). The cleanup report is callable from
    Python; CLI wiring is a V1.5 follow-up.
  - No tmux kill / send-keys / capture-pane / list-sessions calls anywhere in the
    new code. Cleanup report uses YAML data only.
  - Report never emits a recommendation token outside the locked enum. String-grep
    test on render_markdown output for forbidden tokens (auto_kill, safe_to_kill,
    archive_ready, can_archive, green_light, ready_for_archive, auto_archive_eligible).
  - CTO review-pending / changes_requested sessions never receive a kill-implying
    token (e.g. leftover_after_complete) — they get awaiting_review_evidence or needs_cto_review
    only.
  failure_examples:
  - Auto-emitting 'safe_to_kill' or any kill-implying token for a CTO-review-pending
    session.
  - Bootstrap rendering for a legacy handoff (no execution block) silently changing
    because mode-detection assumes the field exists.
  - lib/session_cleanup.py shelling out to 'tmux list-sessions' or any subprocess
    (read-only invariant violated).
  - Editing lib/handoffs.py or orchctl from this handoff (scope violation; handoff
    A owns those).
  - Calling tmux kill / send-keys / archive on any session.
  validation:
  - 'Run targeted: uv run pytest tests/test_bootstrap_delegation_rendering.py tests/test_session_cleanup_report.py
    -v'
  - 'Run full suite: uv run pytest tests/ -q (verify no regressions)'
  - 'Manual smoke: python3 -c ''from lib.session_cleanup import build_cleanup_report,
    render_markdown; r = build_cleanup_report(rooms_filter=["orchestrator-hardening-gc-v1"],
    idle_minutes=1); print(render_markdown(r))'' — verify output is well-formed markdown
    with locked tokens only and runs without exceptions.'
