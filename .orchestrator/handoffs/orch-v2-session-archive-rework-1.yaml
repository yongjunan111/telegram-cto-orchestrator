  - 'After each tasklet: ''uv run pytest tests/test_session_archive*.py -v'' green
    before recording add-subtask.'
  - 'Final: ''uv run pytest tests/ -q'' full suite green; report count delta.'
  - 'Final smoke (manual, real): orchctl session archive-report <sid> -> capture report
    abs path -> orchctl session archive <sid> --from-report <abs> -> exit 0 + bundle
