  - Closing/cleaning the 3 prior stale child handoffs (CTO handles separately).
  invariants:
  - Locked result enum + locked CLI surface unchanged across this rework.
  - Archive bundle path stays under .orchestrator/runtime/session-archives/<session-id>/.
    Producer reports under .orchestrator/runtime/session-archive-reports/<session-id>/
    (or equivalent derived path).
  - safe_write_text containment + symlink-refuse + atomic rename used for ALL new
    derived writes.
  - No subprocess/tmux/network/wiki write inside lib/session_archive*.py executable
    code (grep test enforced).
  - Marker stamp touches session YAML only — never room/handoff YAML.
  - delegate_required gate must be passed by REAL completed internal tasklets, not
    by synthetic add-subtask entries that don't reflect actual diff.
  failure_examples:
  - Team lead creates new file under .orchestrator/handoffs/ for sub-work — VIOLATION
    of CTO no-external-child rule.
  - Bundle YAML still contains null session_summary/handoff_summary/etc on real CLI
