task:
  description: 'V2 Session Archive REWORK 1. YOU ARE TEAM LEAD = 1 tmux session =
    1 feature responsibility boundary. Use INTERNAL Agent tool sub-agents (sonnet)
    for slices; DO NOT create new external child handoff YAML files (CTO directive:
    parent ledger that says completed must not have orphan open child YAML again).
    Record all internal tasklets via ''orchctl handoff add-subtask orch-v2-session-archive-rework-1
    --id <slug> --model-target <model> --owned-file <path>... --status completed --evidence
    <text>'' so the delegate_required gate sees them. Suggested 6-tasklet split (your
    call): (1) archive-report producer ''orchctl session archive-report <session-id>''
    that reads session/room/handoff/git and emits V2-contract YAML (session_id, audit_verdict,
    snapshots.*, git.*); (2) bundle context normalizer so CLI bundles have meaningful
    session_summary/room_summary/handoff_summary/completion_state/review_state/worker_evidence/git_info/wiki_candidates
    (not null); (3) timestamp collision fix (microsecond or suffix); (4) stamp-time
    CAS rehash (session/handoff/room) before marker stamp; if drift -> stale_report
    exit 1, no marker; (5) orchctl main() return-code propagation: cmd_session_archive
    sys.exit -> return, main: sys.exit(args.func(args) or 0) (or document defer reason);
    (6) e2e + CLI hash invariant test using REAL producer output. Final acceptance
    smoke: orchctl session archive-report <sid> -> abs report path -> orchctl session
    archive <sid> --from-report <abs report> -> meaningful bundle yaml/md + session
    marker + rerun returns already_archived.'
  scope: 'ALLOWED FILE EDITS: lib/session_archive*.py, lib/sessions.py (only if archive-report
    producer needs read accessor), tests/test_session_archive*.py, tests/test_session_archive_report*.py
    (new ok), orchctl (add archive-report subparser; keep existing ''session archive''
    surface unchanged). FORBIDDEN EDITS: lib/handoffs.py, lib/rooms.py, lib/dispatch.py,
    lib/bootstrap.py, lib/session_cleanup.py, lib/storage.py, .orchestrator/wiki/**,
    .orchestrator/handoffs/**, .orchestrator/rooms/**, anything under .orchestrator/runtime/sessions
    (read-only except marker stamp via existing bundle module). Trust-but-verify all
    sub-agent outputs before recording add-subtask.'
  constraints:
  - 'LOCKED RESULT ENUM (immutable): archived | stale_report | unsafe_to_archive |
    report_mismatch | parse_error | already_archived. No new values, no renames.'
  - 'LOCKED CLI SURFACE for archive consumer (immutable): ''orchctl session archive
    <session-id> --from-report <absolute-path>''. --from-report REQUIRED + absolute.
    NO --force, --best-effort, --skip-verify, --auto. Exit 0 only on archived.'
  - 'NEW PRODUCER (preferred): ''orchctl session archive-report <session-id>''. Writes
    V2-contract YAML to a deterministic derived path (suggest .orchestrator/runtime/session-archive-reports/<session-id>/<UTC-ts>.yaml).
    Reports MUST contain session_id, audit_verdict (==''promoted'' to allow archive),
    snapshots.{session,handoff,room} hashes matching current YAML state, git.{head_sha,worktree_dirty}.
    No --force / no automation flags.'
  - 'NO external child handoff YAML files. All sub-work must be team-lead-internal
    tasklets recorded only via ''orchctl handoff add-subtask'' on this parent. Reason:
    prior V2 left 3 orphan open child YAMLs while parent ledger said completed; never
    repeat.'
  - NO cron / hooks / idle-timer / tmux subprocess / direct .orchestrator/wiki writes
    / V3 idle automation. Manual CLI only.
  - 'Trust-but-verify: team lead inspects each sub-agent diff and runs targeted pytest
    BEFORE running ''handoff add-subtask''. No add-subtask without local pytest evidence.'
  - delegate_required gate enforced. parent 'handoff complete' will fail-closed if
    execution.child_handoffs is empty or has 0 completed entries.
  acceptance_criteria:
  - 'P1 fixed: A real V2-contract producer exists (preferred ''orchctl session archive-report
    <session-id>''). e2e smoke chain works end-to-end with NO synthetic fixture: producer
    -> abs report path -> ''orchctl session archive <sid> --from-report <abs>'' ->
    archived (exit 0). Test name + producer module path cited in completion.'
  - 'P2 fixed (bundle null shell): bundle YAML written via real CLI path (not synthetic
    test fixture) contains non-null meaningful session_summary, room_summary, handoff_summary,
    completion_state, review_state, worker_evidence_or_checkpoint_refs (where available),
    git_info, next_action, and wiki_candidates (at least empty list, not null). Test
    asserts on real CLI output, not synthetic dict.'
  - 'P2 fixed (timestamp collision): two archives in same UTC second (or with mocked
    clock) produce two distinct files (no overwrite). Test forces collision and verifies
    both bundles exist with distinct paths.'
  - 'P2 fixed (stamp-time CAS): if session/handoff/room YAML changes between bundle
    write and marker stamp, marker is NOT written and result is stale_report (exit
    1). Test mutates a YAML mid-flow and asserts no marker.'
  - 'P2 fixed (ledger hygiene addressed at CTO layer): CTO will close prior 3 stale
    child handoffs (orch-v2-archive-validate, -bundle, -cli) outside this handoff.
    Team lead does NOT touch those YAMLs. Just confirm in completion report that no
    NEW orphan child YAML was created by this rework.'
  - 'Optional / can defer with reason: cmd_session_archive sys.exit(1) -> return 1
    + orchctl main ''sys.exit(args.func(args) or 0)'' propagation. CLI-level hash
    invariant test (room/handoff YAML SHA-256 unchanged after successful archive)
    MUST be added regardless.'
  - 'Full pytest suite green: ''uv run pytest tests/ -q'' passes, with new tests for
    each P1/P2 finding fixed. No regressions.'
  - 'Parent execution.child_handoffs ledger has >=1 completed entry (delegate_required
    gate). Each entry: real internal tasklet slug, model_target, owned_files matching
    diff, status=completed, evidence with test name + line count delta.'
  report_back: 'Telegram thread (chat 8585947943): 6 mandatory items - (1) team-lead/internal
    tasklets used + reason no external tmux; (2) exact files changed (git diff --stat);
    (3) per-finding fixed/deferred + evidence + test name; (4) targeted + full pytest
    results with count delta; (5) manual smoke command chain (producer -> archive
    -> rerun) with exit codes + bundle/marker paths; (6) final state of orch-v2-session-archive-rework-1
    (and confirm no new orphan child YAML).'
  non_goals:
  - V3 idle/cron/hook/timer automation. Defer.
  - tmux lifecycle automation, session kill, pane reaping. Defer.
  - Direct writes to .orchestrator/wiki/**. Wiki hints stay in bundle field only.
  - New external child handoff YAML files. All sub-work is internal-tasklet only.
  - Touching unrelated modules (lib/handoffs.py, lib/dispatch.py, lib/bootstrap.py,
