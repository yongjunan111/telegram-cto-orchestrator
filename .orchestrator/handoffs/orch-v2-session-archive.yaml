handoff:
  id: orch-v2-session-archive
  room_id: orchestrator-hardening-gc-v1
  program_id: null
  from: orchestrator
  to: orch-v2-archive-lead
  status: completed
  priority: high
  kind: implementation
task:
  description: 'Coordinate V2 session archive (''orchctl session archive <id> --from-report
    <abs-path>''). YOU ARE TEAM LEAD. DO NOT IMPLEMENT DIRECTLY. The implementation
    is split across 3 child handoffs (orch-v2-archive-validate, orch-v2-archive-bundle,
    orch-v2-archive-cli). Your responsibilities: (1) Read the locked contract below
    and confirm child handoffs match it. (2) Wait for each child to be dispatched,
    executed, completed, and CTO-approved. (3) Once each child is approved, run ''orchctl
    handoff add-subtask orch-v2-session-archive --id <child-id> --model-target <model>
    --owned-file <path> --owned-file <path>... --status completed --evidence "<test
    count + commit refs>"'' so the parent ledger reflects the child evidence. (4)
    Run integration smoke after all 3 children land: full pytest, then a manual archive
    of a real test session. (5) Finally run ''orchctl handoff complete orch-v2-session-archive
    --by orch-v2-archive-lead --summary "<summary>" --task-criterion-cover <n>:<evidence>...''.
    The delegate_required gate enforces ≥1 completed child_handoffs entry — your job
    is to make sure all 3 are recorded and the gate passes naturally because work
    is genuinely done.'
  scope: 'ALLOWED FILE EDITS: NONE. You are team lead and do not write code. Children
    write code. You only run orchctl commands (handoff add-subtask, handoff complete,
    integration smoke). If you find yourself opening an editor on lib/* or tests/*,
    STOP — that is the children''s scope and the gate will reject your completion.'
  constraints:
  - 'LOCKED RESULT ENUM (V2 final): archived | stale_report | unsafe_to_archive |
    report_mismatch | parse_error | already_archived. Children must use exactly these
    values; no variants.'
  - 'LOCKED CLI SURFACE: ''orchctl session archive <session-id> --from-report <absolute-path>''.
    --from-report is REQUIRED. Relative paths fail-closed. Repo-escaping (symlink/traversal)
    fails-closed. Exit 0 on ''archived''; non-zero with stderr identifying enum on
    any other outcome. No --force, --best-effort, --skip-verify, or auto-mode flags
    in V1 of V2.'
  - 'LOCKED ARCHIVE PATH: .orchestrator/runtime/session-archives/<session-id>/<UTC-iso-timestamp>.yaml
    + .md (both written, same basename). Use safe_write_text (containment + symlink-refuse
    + atomic rename).'
  - 'LOCKED SESSION YAML MARKER: archive: {status: archived, archived_at: <UTC iso>,
    archive_path: <repo-relative path to the .yaml file>, from_report: <os.path.realpath
    of report path>}. Marker written ONLY after all validations pass and bundle write
    succeeds. NEVER touches room or handoff YAML — session YAML only.'
  - 'LOCKED VALIDATION ORDER (Child A enforces): (1) relative path → parse_error;
    (2) outside-repo or symlink escape → unsafe_to_archive; (3) session_id mismatch
    → report_mismatch; (4) unsafe slug ref → parse_error; (5) audit_verdict != ''promoted''
    → unsafe_to_archive; (6) session.archive.status == ''archived'' → already_archived;
    (7) YAML state hash drift → stale_report; (8) git HEAD/worktree drift → stale_report.
    Order matters; first failure wins.'
  - Children must NOT call cron/hook/idle-timer/background-worker code paths. No automatic
    invocation. Manual CLI is the only way to trigger V2.
  - Children must NOT write to .orchestrator/wiki/* directly. Wiki hints belong inside
    the archive bundle (yaml field 'wiki_candidates' and md section), not as a write
    to the wiki.
  - Children must NOT call tmux/send-keys/respawn/kill or any subprocess against tmux.
    Pure file IO + git plumbing only.
  - Children must NOT modify room or handoff YAML. Marker writes touch session YAML
    only. archive bundle writes go to .orchestrator/runtime/session-archives/.
  - 'Acceptance gate via add-subtask: each child''s add-subtask record must list the
    child handoff id, model_target, owned_files (matching the child''s actual files
    changed), status=completed, evidence (paste the test count delta + a one-line
    summary). Parent''s gate verifies 3 completed entries before allowing parent complete.'
  acceptance_criteria:
  - 'Parent''s execution.child_handoffs ledger has exactly 3 entries with status=completed
    and matching child handoff ids: orch-v2-archive-validate, orch-v2-archive-bundle,
    orch-v2-archive-cli.'
  - All 3 child handoffs reach review.outcome=approved before parent completion is
    attempted.
  - 'Integration smoke: ''orchctl session archive <real-session-id> --from-report
    <abs-path-to-real-promoted-report>'' produces an archive bundle and stamps the
    session marker. Re-running the same command returns ''already_archived''.'
  - 'Full pytest suite green: ''uv run pytest tests/ -q'' (count must increase by
    ≥3 dedicated child test files; existing tests must not regress).'
  - No file edit by team lead session itself (verifiable via git log; only orchctl-driven
    YAML writes for ledger + marker). Code commits must come from child workers.
  report_back: 'Post in CTO Telegram thread when complete: (a) the 3 child handoff
    ids and their final review outcomes, (b) add-subtask records (one line each),
    (c) integration smoke command + result, (d) full pytest count delta, (e) any deviations
    from locked contract that required escalation.'
  non_goals:
  - V3 automatic idle trigger (deferred). V2 must NOT include any cron/timer/hook/idle-detector
    code.
  - tmux safe-close or session lifecycle automation. V2 archive does NOT touch tmux.
  - Direct wiki curation. V2 emits wiki hints in the bundle only — no writes to .orchestrator/wiki/*.
  - Modifying lib/gc_audit.py, lib/idle_snapshot.py, lib/session_cleanup.py, or any
    other existing module beyond what each child handoff explicitly allows.
  - Reviewing/approving the children — that is CTO's job after each child completes.
    Team lead only records add-subtask entries.
  - Force-pushing or rewriting git history.
  - Any work on orch-room-idle-snapshot-v1, statusline, paper-radar, session_id truncation
    bug, or stale open handoffs cleanup.
  invariants:
  - Team lead does NOT touch lib/* or tests/* or docs/* or orchctl. If team lead's
    pane shows an editor on those, escalate to CTO instead.
  - Parent handoff completes ONLY after all 3 child handoffs (validate, bundle, cli)
    reach review.outcome=approved AND are recorded via add-subtask on this parent.
  - Locked contract values (result enum, CLI surface, marker schema, validation order,
    archive path) are immutable across child handoffs. If a child proposes a change,
    escalate to CTO before any code edits land.
  failure_examples:
  - Team lead opens an editor on lib/session_archive.py — scope violation, gate should
    reject completion.
  - Team lead runs 'handoff complete' before any child is approved or before add-subtask
    is recorded — gate exits non-zero.
  - Children diverge on result enum names (e.g. 'archive_failed' instead of locked
    enum) — team lead must escalate before any merge.
  - Cron/timer/hook code added — V2 boundary violation.
  validation:
  - 'Run pytest after each child lands: ''uv run pytest tests/ -q''. Confirm green
    before recording add-subtask.'
  - Run a manual archive smoke at the end against a real promoted report. Capture
    command + exit code + bundle path.
  - Run 'orchctl handoff show orch-v2-session-archive' before complete; verify execution.child_handoffs
    has 3 entries.
