    status: completed
    evidence: 'Two P2 invariants from Codex review closed via single dirfd-based primitive.
      lib/session_archive_report.py: REMOVED _check_no_symlink_in_chain (TOCTOU-vulnerable
      + scope-too-broad walked from /), _orchestrator_dir, _reports_root_dir, _reserve_unique_target
      (placeholder-based check-then-write race). REMOVED safe_write_text call from
      producer write path (replaced with stronger primitive — safe_write_text itself
      untouched, contract preserved). ADDED _open_or_create_dir_nofollow(parent_fd,
      name) using openat O_DIRECTORY|O_NOFOLLOW|O_CLOEXEC + mkdirat on ENOENT; ELOOP
      propagates atomically. ADDED _write_archive_report_atomic(repo_root, session_id,
      timestamp, content) opens .orchestrator (operator trust boundary; symlinks ABOVE
      not our concern), then descends through runtime/, session-archive-reports/,
      <sid>/ via _open_or_create_dir_nofollow with O_NOFOLLOW on every step; final
      file via os.open with O_CREAT|O_EXCL|O_WRONLY|O_NOFOLLOW|O_CLOEXEC + dir_fd=session_dir_fd
      writing content directly + os.fsync (no placeholder, no separate replace). FileExistsError
      retries with -1, -2, ... up to 10000 attempts. cmd_session_archive_report calls
      _write_archive_report_atomic. F1 fix: scope is .orchestrator boundary downward
      only — repo can be at /var/folders/.../tmp on macOS (where /var is a symlink
      to /private/var); the dirfd walk starts at .orchestrator unconditionally, so
      above-repo symlinks no longer cause false rejection. F2 fix: once we hold an
      fd to a directory inode, the path string can be swapped to a symlink concurrently
      — all subsequent openat(dir_fd=fd, ...) operations land in the original inode,
      not the symlink target. Combined with O_NOFOLLOW on each step, no TOCTOU window
      exists. tests/test_session_archive_report.py: +3 tests (test_archive_report_succeeds_under_symlinked_ancestor
      F1A — repo under sym-root/repo path with /sym-root -> /real-root symlink, producer
      succeeds; test_dirfd_write_is_immune_to_post_open_path_swap F2A — helper-level
      race regression: open dirfd to real dir, attacker renames real dir aside + symlinks
      original path to outside-escape, write through fd lands in original inode, outside
      dir empty; test_symlink_at_runtime_inside_orchestrator_is_refused F2B — preserved
      invariant: pre-plant runtime/ -> outside, producer exit 1, no escape). Targeted
      pytest tests/test_session_archive_report.py tests/test_session_archive_cli.py
      -q: 35 passed (was 32, +3). Full pytest tests/ -q: 348 passed (was 345, +3,
      0 regressions). Smoke: orchctl session archive-report orch-worker-a-founda-orch-foundation-fixes
      -> /home/dydwn/projects/telegram-cto-orchestrator/.orchestrator/runtime/session-archive-reports/<sid>/2026-04-26T07:29:22Z.yaml
      exit 0. Both rework-2/3 help surfaces preserved (orchctl session --help: V2
      archive-report wording on archive line; orchctl session archive --help: rework-2
      --from-report wording).'
