task:
  description: 'V2 archive rework-4. Close 2 P2 invariants from Codex post-rework-3
    review. YOU ARE TEAM LEAD = same responsibility boundary as rework-1/2/3, reuse
    same pane. 1 internal Agent(sonnet) tasklet recommended (single coherent change),
    NO new external child YAML. **Finding 1: containment scope.** lib/session_archive_report.py:_check_no_symlink_in_chain
    currently walks from / down to target — rejects legitimate workspaces where repo
    is under symlinked ancestor (macOS /var, etc.). Must scope check to repo_root
    or .orchestrator boundary downward. Symlinks ABOVE the boundary are not our concern.
    **Finding 2: TOCTOU placeholder gap.** _reserve_unique_target does (a) symlink
    precheck, (b) os.makedirs, (c) os.open(O_CREAT|O_EXCL) writing 0-byte placeholder,
    (d) safe_write_text containment + os.replace. Between (a) and (b)/(c), parent
    can be swapped to symlink → 0-byte placeholder lands outside repo. Codex confirmed
    via simulation. Fix: separate name candidate selection from file creation; file
    creation MUST happen inside verified .orchestrator boundary with exclusive CONTENT
    write (not 0-byte placeholder + later replace). Consider dirfd/openat/O_NOFOLLOW
    or equivalent realpath revalidation immediately before write. Optionally add a
    small storage.py exclusive-writer helper. NO monkeypatch-only fixes.'
  scope: 'ALLOWED: lib/session_archive_report.py, tests/test_session_archive_report.py,
    optional lib/storage.py + tests/test_storage.py (if you add a small safe-exclusive-write
    helper). FORBIDDEN: orchctl (helps already correct), lib/session_archive.py, lib/session_archive_bundle.py,
    lib/session_archive_validate.py, lib/handoffs.py, lib/bootstrap.py, lib/session_cleanup.py,
    .orchestrator/wiki/**, .orchestrator/handoffs/**, .orchestrator/rooms/**.'
