  description: "경쟁 밀도 기반 보정 정책 테이블 구현.\n\n1. 정책 테이블 설계:\n   - 키: 가격대(별표) × 경쟁구간(기존\
    \ 6개)\n   - 값: 1순위 낙찰자 투찰비율 중앙값 (P50), P25, P75\n   - 메타데이터: 표본 수, 신뢰도, 적용일, holdout\
    \ 기간\n   - 저장: JSON 또는 YAML, 하드코딩 금지\n\n2. holdout 데이터로 생성:\n   - 전체 투찰자가 아닌 1순위\
    \ 낙찰자만 필터링\n   - 하한율 아래 밴드는 잘라냄\n\n3. 밴드 재설계:\n   - 현재: 기대점수 기반 ±threshold → 적중률\
    \ 0%\n   - 변경: 1순위 낙찰자 P25~P75를 밴드로 사용\n   - 경쟁 구간별 밴드 범위 차등\n\n4. 밴드 계산을 화면(view)에서\
    \ 빼서 엔진 쪽 결과로 내려줌\n\n기존 분석: data/collected/segment_policy_v1.json 참조\n기존 엔진: g2b/services/optimal_bid.py\
    \ (OptimalBidResult.band_low/band_high)"
