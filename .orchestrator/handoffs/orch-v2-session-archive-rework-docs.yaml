task:
  description: 'DOCS PHASE follow-up to rework-5 (code phase already approved). Markdown-only
    edit. NO code, NO tests required. Append two sections to docs/issue-v2-session-archive-rework-churn.md
    (after the existing ''Operating Lesson'' section): (A) **Why Rework-4 Happened**:
    rework-3 closed more symptoms (containment scope from /, atomic O_EXCL reservation,
    parent help) but two latent issues remained — (1) full-chain symlink check from
    / over-rejected legitimate workspaces (macOS /var symlink ancestor); (2) precheck
    → makedirs → 0-byte placeholder → replace had a TOCTOU window where attacker could
    swap a parent to symlink between precheck and makedirs, dropping a 0-byte placeholder
    OUTSIDE the repo. Codex confirmed concretely. Fix required dirfd + O_NOFOLLOW
    content-write primitive: openat each chain component holding fds, write content
    directly via O_CREAT|O_EXCL|O_WRONLY|O_NOFOLLOW with dir_fd. Once an fd is held,
    path swaps cannot redirect (kernel inode resolution). (B) **Why Rework-5 Happened**:
    rework-4''s direction was correct, but the dirfd primitive''s entry point —  itself
    — was opened with O_DIRECTORY|O_CLOEXEC (NO O_NOFOLLOW) as the operator trust
    boundary. Codex confirmed: a symlinked .orchestrator → outside lets writes escape.
    Fix: split entry into two steps — open repo_root with O_DIRECTORY|O_CLOEXEC (no
    O_NOFOLLOW so above-repo symlinks like /var still succeed), then openat(''.orchestrator'',
    O_DIRECTORY|O_NOFOLLOW|O_CLOEXEC, dir_fd=repo_fd) so .orchestrator itself is refused
    if symlinked. Above-repo symlinks remain explicitly out of scope (operator trust).
    Tone: keep existing ''docs not authoritative; code/handoff YAML/room YAML/runtime
    session YAML/git history are authoritative'' line. Sections should let a future
    reader understand WHY 5 rounds were needed, not what the code looks like (code
    is in lib/session_archive_report.py). 1 internal Agent(sonnet/haiku) tasklet ok,
    NO new external child YAML.'
  scope: 'ALLOWED: docs/issue-v2-session-archive-rework-churn.md (append-only). FORBIDDEN:
    lib/**, tests/**, orchctl, .orchestrator/wiki/**, .orchestrator/handoffs/**, .orchestrator/rooms/**,
