task:
  description: 'V2 archive rework-3. Close 3 invariant-level findings from post-approval
    adversarial review (docs/issue-v2-session-archive-rework-churn.md). YOU ARE TEAM
    LEAD = same responsibility boundary as rework-1/2 (reuse same pane). 1-2 internal
    Agent(sonnet) tasklets, NO new external child YAML. Findings: (1) report write
    containment must hold for symlinks ABOVE reports_root, not just at session-dir
    level. Either raise safe_write_text base_dir to repo_root/.orchestrator OR add
    explicit parent-chain no-symlink check from repo down to reports_root. Pre-plant
    a symlink above reports_root (e.g. .orchestrator/runtime -> /tmp/escape) BEFORE
    producer runs; cmd_session_archive_report must exit 1 with outside dir remaining
    empty. (2) atomic filename reservation. Two producers in same UTC second observing
    same first path must NOT overwrite each other. Use O_CREAT|O_EXCL semantics or
    equivalent atomic reservation with retry on FileExistsError. Do NOT weaken safe_write_text.
    Final paths stay under .orchestrator/runtime/session-archive-reports/<sid>/<ts>[-N].yaml.
    Test: simulate/coordinate concurrent calls that observe same timestamp; assert
    distinct paths AND both files retain own contents. (3) parent help surface ''orchctl
    session --help'' must say V2 archive-report YAML produced by orchctl session archive-report
    (currently still says promoted gc-audit/idle-snapshot). Both surfaces verified.'
