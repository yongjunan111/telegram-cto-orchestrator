# Room State Template
# Copy this directory to create a new room.
# state.yaml is the authoritative state; log.md is append-only.

room:
  id: "TEMPLATE"
  name: ""
  status: draft              # draft | active | paused | completed | archived
  program_id: null           # link to parent program
  created_at: null
  updated_at: null

context:
  goal: ""
  constraints: []
  acceptance_criteria: []

# ── Derived View ──────────────────────────────────────────────────────────────
# These fields are populated by reading active handoffs.
# Do not set manually. See docs/architecture.md Authority Model.
assignments:
  owner: null                  # derived: active handoff's `to` field
  reviewers: []                # derived: handoff or program context

lifecycle:
  current_phase: triage      # triage | planning | execution | review | done
  blocked_by: null
  next_action: ""
